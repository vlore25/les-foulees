name: les-foulees-prod

services:
  app:
    build:
      context: .
      target: runner 
      args:
        JWT_SECRET: ${JWT_SECRET}
        DATABASE_URL: ${DATABASE_URL}
        RESEND_API_KEY: ${RESEND_API_KEY}
    deploy:
      resources:
        limits:
          cpus: '0.70'
          memory: 800M
        reservations:
          cpus: '0.60'
          memory: 700M
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3000:3000"
    restart: always 
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lesfoulees
    volumes:
      - db-data-prod:/var/lib/postgresql/data

volumes:
  db-data-prod: